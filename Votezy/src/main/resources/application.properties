spring.application.name=Votezy

# Database - uses environment variables (set on Railway/Render)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/votezy_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:abhinavch@512}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Port (Railway sets PORT env variable automatically)
server.port=${PORT:8080}
